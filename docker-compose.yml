services:
  eurovision:
    build: .
    container_name: eurovision-2026
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATA_DIR: /data
      PORT: "3000"
    volumes:
      - eurovision-data:/data
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:3000"

volumes:
  eurovision-data:
